version: '3'

vars:
  PROJECT_NAME: petit-blog
  DB_NAME: petit-blog-db

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  install:
    desc: Install npm dependencies
    cmds:
      - npm install
    status:
      - test -d node_modules

  dev:
    desc: Start local dev server (with Cloudflare platformProxy)
    deps: [install]
    cmds:
      - npm run dev

  build:
    desc: Build the static site
    deps: [install]
    cmds:
      - npm run build
    sources:
      - src/**/*
      - astro.config.mjs
      - wrangler.toml
    generates:
      - dist/**/*

  preview:
    desc: Preview production build locally via wrangler dev
    deps: [build]
    cmds:
      - npm run preview

  # Database tasks
  db:init:
    desc: Apply schema.sql to LOCAL D1
    cmds:
      - npx wrangler d1 execute {{.DB_NAME}} --file=./schema.sql

  db:init:remote:
    desc: Apply schema.sql to REMOTE D1
    cmds:
      - npx wrangler d1 execute {{.DB_NAME}} --remote --file=./schema.sql

  db:list:
    desc: List all posts from REMOTE D1
    cmds:
      - npx wrangler d1 execute {{.DB_NAME}} --remote --command "SELECT id, slug, title, created_at FROM posts ORDER BY created_at DESC"

  # Cloudflare tasks
  cf:login:
    desc: Login to Cloudflare
    cmds:
      - npx wrangler login

  cf:secret:
    desc: Set AUTH_KEY secret (prompts for value)
    cmds:
      - npx wrangler secret put AUTH_KEY

  cf:logs:
    desc: Stream live logs from the deployed worker
    cmds:
      - npx wrangler tail

  # Deployment
  deploy:
    desc: Build and deploy to Cloudflare Workers
    cmds:
      - task: build
      - echo "_worker.js" > dist/.assetsignore
      - npx wrangler deploy

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist/
